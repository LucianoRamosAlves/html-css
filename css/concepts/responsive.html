<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport meta tag is essential for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website Example</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mobile-first approach: base styles for small screens */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Header styling */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        /* Navigation styling */
        nav {
            background-color: #34495e;
            padding: 0.5rem;
        }

        nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background-color: #2c3e50;
        }

        nav a:hover {
            background-color: #e74c3c;
        }

        /* Main content area */
        .container {
            padding: 1rem;
        }

        .content {
            background-color: #ecf0f1;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
        }

        /* Footer styling */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

        /* Tablet screens (768px and above) */
        @media (min-width: 768px) {
            nav {
                display: flex;
                gap: 1rem;
            }

            nav a {
                display: inline-block;
                margin-bottom: 0;
                background-color: transparent;
            }

            nav a:hover {
                background-color: #e74c3c;
            }

            .container {
                display: flex;
                gap: 2rem;
            }

            .content {
                flex: 1;
            }
        }

        /* Desktop screens (1024px and above) */
        @media (min-width: 1024px) {
            body {
                font-size: 18px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Responsive Website</h1>
        <p>Study Example</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="content">
            <h2>Section 1</h2>
            <p>This is a responsive layout that adapts to different screen sizes using media queries.</p>
        </div>
        <div class="content">
            <h2>Section 2</h2>
            <p>On mobile: vertical layout. On tablet and above: horizontal flexible layout.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Responsive Website Example</p>
    </footer>
</body>
</html>
