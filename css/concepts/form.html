<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Moderno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #0f3820 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo animado com partículas */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(76, 175, 80, 0.1) 0%, transparent 50%);
            animation: moveGradient 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes moveGradient {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(76, 175, 80, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 2;
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #1a472a;
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
            animation: fadeInDown 0.6s ease-out 0.2s both;
            text-shadow: 2px 2px 4px rgba(76, 175, 80, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #4caf50;
            font-size: 14px;
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .form-group:nth-child(2) { animation-delay: 0.5s; }
        .form-group:nth-child(3) { animation-delay: 0.6s; }
        .form-group:nth-child(4) { animation-delay: 0.7s; }
        .form-group:nth-child(5) { animation-delay: 0.8s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1a472a;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0f2e9;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8fffe;
            color: #1a472a;
        }

        input::placeholder,
        textarea::placeholder {
            color: #9fb69d;
        }

        input:hover,
        textarea:hover,
        select:hover {
            border-color: #4caf50;
            background: #f0f9f5;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.1);
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2e7d32;
            background: white;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2),
                        0 8px 24px rgba(76, 175, 80, 0.15);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 130px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out 0.9s both;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #56c956 0%, #388e3c 100%);
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Efeito de destaque nos inputs */
        input:valid,
        textarea:valid,
        select:valid {
            border-color: #4caf50;
        }

        input:invalid,
        textarea:invalid {
            border-color: #ff6b6b;
        }

        /* Animação de sucesso */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>💬 Entre em Contato</h1>
        <p class="subtitle">Responderemos em breve</p>
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" name="name" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Assunto</label>
                <input type="text" id="subject" name="subject" placeholder="Assunto da mensagem" required>
            </div>

            <div class="form-group">
                <label for="category">Categoria</label>
                <select id="category" name="category" required>
                    <option value="">Selecione uma categoria</option>
                    <option value="support">Suporte</option>
                    <option value="feedback">Feedback</option>
                    <option value="sales">Vendas</option>
                    <option value="parcerias">Parcerias</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Mensagem</label>
                <textarea id="message" name="message" placeholder="Digite sua mensagem aqui..." required></textarea>
            </div>

            <button type="submit">✉️ Enviar Mensagem</button>
        </form>
    </div>
</body>
</html>
