{% extends 'base.html' %}
{% block content %}

<body>   <!-- Registration Section -->
    <div class="register-container">
        <div class="register-wrapper">
            <div class="register-header">
                <h1>Criar Conta</h1>
                <p>Junte-se à nossa comunidade de investidores premium</p>
            </div>

            <form class="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-input" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-input" placeholder="Criar senha" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Confirmar Senha</label>
                        <input type="password" class="form-input" placeholder="Confirmar senha" required>
                    </div>
                </div>

                <div class="register-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Concordo com os <a href="#">Termos de Serviço</a> e 
                        <a href="#">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary register-submit">Criar Conta</button>
            </form>

            <div class="register-footer">
                Já tem conta? <a href="{{ url_for('auth.login') }}">Faça login</a>
            </div>
        </div>
    </div>
</body>
{% endblock %}
