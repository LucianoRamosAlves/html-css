<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas em HTML</title>
</head>
<body>
    <h1>Exercício: Tabelas em HTML</h1>
    
    <!-- Uma tabela é definida com a tag <table> -->
    <table border="1">
        <!-- <thead> agrupa o cabeçalho da tabela -->
        <thead>
            <tr>
                <!-- <th> é um header (cabeçalho) da coluna -->
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        
        <!-- <tbody> agrupa o corpo/conteúdo da tabela -->
        <tbody>
            <!-- <tr> define uma linha da tabela -->
            <tr>
                <!-- <td> define uma célula de dado -->
                <td>João</td>
                <td>25</td>
                <td>São Paulo</td>
            </tr>
            
            <tr>
                <td>Maria</td>
                <td>30</td>
                <td>Rio de Janeiro</td>
            </tr>
            
            <tr>
                <td>Pedro</td>
                <td>28</td>
                <td>Belo Horizonte</td>
            </tr>
        </tbody>
        
        <!-- <tfoot> agrupa o rodapé da tabela (opcional) -->
        <tfoot>
            <tr>
                <td colspan="3">Total de registros: 3</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
