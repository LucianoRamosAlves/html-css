<!DOCTYPE html>
<html lang="pt-BR" spellcheck="true">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validações de Formulário em HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Validações de Formulário em HTML</h1>
    <form>
        <!-- Validação: Campo obrigatório -->
        <label for="nome">Nome (obrigatório):</label>
        <input type="text" id="nome" name="nome" required>

        <!-- Validação: Email válido -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <!-- Validação: Número inteiro -->
        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" min="18" max="100">

        <!-- Validação: Telefone com padrão -->
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" pattern="[0-9]{2} [0-9]{4,5}-[0-9]{4}" placeholder="(XX) XXXXX-XXXX">

        <!-- Validação: URL válida -->
        <label for="website">Website:</label>
        <input type="url" id="website" name="website">

        <!-- Validação: Data -->
        <label for="data">Data de Nascimento:</label>
        <input type="date" id="data" name="data">

        <!-- Validação: Senha com comprimento mínimo -->
        <label for="senha">Senha (mínimo 8 caracteres):</label>
        <input type="password" id="senha" name="senha" minlength="8" required>

        <!-- Validação: Campo com limite de caracteres -->
        <label for="bio">Biografia (máximo 200 caracteres):</label>
        <textarea id="bio" name="bio" maxlength="200"></textarea>

        <!-- Validação: Seleção obrigatória em lista -->
        <label for="pais">País:</label>
        <select id="pais" name="pais" required>
            <option value="">Selecione um país</option>
            <option value="brasil">Brasil</option>
            <option value="portugal">Portugal</option>
            <option value="eua">EUA</option>
        </select>

        <!-- Validação: Checkbox obrigatório -->
        <label>
            <input type="checkbox" name="termos" required>
            Concordo com os termos de serviço
        </label>

        <!-- Validação: Radio button obrigatório -->
        <label>Gênero:</label>
        <label>
            <input type="radio" name="genero" value="masculino" required> Masculino
        </label>
        <label>
            <input type="radio" name="genero" value="feminino"> Feminino
        </label>
        <label>
            <input type="radio" name="genero" value="outro"> Outro
        </label>

        <!-- Botão para enviar o formulário -->
        <button type="submit">Enviar Formulário</button>
        <button type="reset">Limpar Formulário</button>
    </form>
</body>
</html>
